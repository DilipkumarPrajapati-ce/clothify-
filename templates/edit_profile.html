{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Profile | Clothify</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

{% include 'navbar.html' %}

<section class="profile-page">

    <div class="profile-card">

        <h2>Edit Profile</h2>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="form-group">
                <label>Profile Photo</label>
                {{ form.profile_photo }}
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                {{ form.mobile }}
            </div>

            <div class="form-group">
                <label>Address</label>
                {{ form.address }}
            </div>

            <div class="form-group">
                <label>City</label>
                {{ form.city }}
            </div>

            <div class="form-group">
                <label>State</label>
                {{ form.state }}
            </div>

            <div class="form-group">
                <label>Pincode</label>
                {{ form.pincode }}
            </div>

            <button type="submit" class="save-btn">
                Save Profile
            </button>

        </form>

    </div>

</section>

{% include 'footer.html' %}

</body>
</html>
